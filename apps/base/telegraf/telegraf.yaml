apiVersion: v1
kind: Secret
metadata:
  name: telegraf-values
  namespace: infra-packages
stringData:
  values.yml: |
    domainName: cluster.local
    isMetricProxyConfigured: true
---
apiVersion: packaging.carvel.dev/v1alpha1
kind: PackageInstall
metadata:
  name: telegraf
  namespace: infra-packages
  annotations:
    argocd.argoproj.io/sync-wave: '1'
spec:
  packageRef:
    refName: telegraf.kubernetes.vmware.com
    versionSelection:
      # Placeholder — version supplied by the feature-scoped env sub-component
      # (apps/components/envs/{env}/observability), included alongside the stack.
      constraints: replace-me
      prereleases: {}
  serviceAccountName: carvel-sa
  values:
  - secretRef:
      name: telegraf-values