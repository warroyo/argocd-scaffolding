# Per-tenant ArgoCD sync-impersonation identity. Design:
# docs/ARCHITECTURE.md "Cluster policy + namespace self-service".
# Dedicated namespace (own lifecycle, out of tenant policy scope); sync-wave -1
# so it exists before the SA/RBAC below.
apiVersion: v1
kind: Namespace
metadata:
  name: platform-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    gitops.platform/project: infra
    gitops.platform/environment: infra
---
# Name suffixed per-tenant by cluster-var-injector (inject-project-suffix).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tenant-sync-replaceme
  namespace: platform-gitops
  labels:
    config.k8s.io/inject-project-suffix: "true"
---
# Namespaced-kinds admin, cluster-wide — no cluster-scoped writes (the AppProject
# clusterResourceWhitelist caps that). Built-in "admin" role is never renamed.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tenant-sync-replaceme-admin
  labels:
    config.k8s.io/inject-project-suffix: "true"
    config.k8s.io/inject-project-subject: "true"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
subjects:
- kind: ServiceAccount
  name: tenant-sync-replaceme
  namespace: platform-gitops
---
# admin lacks Namespace create/update (cluster-scoped) — grant it narrowly here
# rather than widening the AppProject clusterResourceWhitelist.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tenant-sync-namespace-manager
rules:
- apiGroups: ['']
  resources: ['namespaces']
  verbs: ['create', 'get', 'list', 'watch', 'update', 'patch']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tenant-sync-namespace-manager
  labels:
    config.k8s.io/inject-project-subject: "true"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tenant-sync-namespace-manager
subjects:
- kind: ServiceAccount
  name: tenant-sync-replaceme
  namespace: platform-gitops
---
# Gateway API / AKO / istio CRDs don't carry the aggregate-to-admin label, so the
# built-in "admin" ClusterRole above doesn't cover them — grant explicitly so a
# tenant can create its own Gateway (any provider). Namespaced kinds only, same
# cluster-wide model as admin.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tenant-sync-gateway-api
rules:
- apiGroups: ['gateway.networking.k8s.io']
  resources: ['*']
  verbs: ['*']
- apiGroups: ['networking.istio.io']
  resources: ['*']
  verbs: ['*']
- apiGroups: ['ako.vmware.com']
  resources: ['*']
  verbs: ['*']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tenant-sync-gateway-api
  labels:
    config.k8s.io/inject-project-subject: "true"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tenant-sync-gateway-api
subjects:
- kind: ServiceAccount
  name: tenant-sync-replaceme
  namespace: platform-gitops
---
# external-secrets.io CRDs don't aggregate to "admin", so a tenant can't create
# its own ExternalSecret/SecretStore without this. Namespaced kinds only (same
# cluster-wide model as admin); the shared ClusterSecretStore is platform-owned
# (synced under the infra project) and stays out of the tenant's reach via the
# AppProject's Namespace-only clusterResourceWhitelist. See docs/ARCHITECTURE.md
# "Secret store".
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tenant-sync-external-secrets
rules:
- apiGroups: ['external-secrets.io', 'generators.external-secrets.io']
  resources: ['*']
  verbs: ['*']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tenant-sync-external-secrets
  labels:
    config.k8s.io/inject-project-subject: "true"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tenant-sync-external-secrets
subjects:
- kind: ServiceAccount
  name: tenant-sync-replaceme
  namespace: platform-gitops
