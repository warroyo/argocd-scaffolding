apiVersion: v1
kind: Namespace
metadata:
  name: infra-packages
  labels:
    # Taxonomy consistency with supervisor namespaces (gitops.platform/*) — also
    # keeps this namespace explicitly outside any tenant's
    # gitops-namespace-containment selector (which matches on absence of a
    # matching tenant project value, not presence of this label specifically).
    gitops.platform/project: infra
    gitops.platform/environment: infra
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: carvel-sa
  namespace: infra-packages
  annotations:
    argocd.argoproj.io/sync-wave: '-1'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: carvel-sa-cluster-role
  annotations:
    argocd.argoproj.io/sync-wave: '-1'
rules:
- apiGroups:
  - '*'
  resources:
  - '*'
  verbs:
  - '*'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: carvel-sa-cluster-rolebinding
  annotations:
    argocd.argoproj.io/sync-wave: '-1'
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: carvel-sa-cluster-role
subjects:
- kind: ServiceAccount
  name: carvel-sa
  namespace: infra-packages