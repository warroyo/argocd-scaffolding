# SA ESO authenticates to the VCF Secret Store (OpenBao) k8s-auth mount as; the
# mount's auto-created role expects the system:auth-delegator binding. Lives in
# the ESO-owned `external-secrets` namespace (created by the helm add-on). Full
# flow: docs/ARCHITECTURE.md "Secret store".
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secret-store-access
  namespace: external-secrets
  labels:
    app.kubernetes.io/name: secret-store
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ss-auth-binding
  labels:
    app.kubernetes.io/name: secret-store
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
- kind: ServiceAccount
  name: secret-store-access
  namespace: external-secrets
