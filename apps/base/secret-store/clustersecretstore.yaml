# Connects ESO to the VCF Secret Store (OpenBao). mountPath/role are derived from
# the suffixed namespace + cluster name by cluster-var-injector (placeholder
# segments below); caBundle is patched per env (apps/components/envs/{env}). The
# Secret Store auto-creates the mount/role/policy per cluster — names are
# always kubernetes-<ns>-<cluster> / <ns>-<cluster>. See docs/ARCHITECTURE.md.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vcf-cluster-store
  labels:
    app.kubernetes.io/name: secret-store
spec:
  provider:
    vault:
      # hostAlias secret-store -> Secret Store external IP is set on the ESO
      # helm values (infra side, envs/{env}) so the service cert (CN secret-store) verifies.
      server: "https://secret-store:8200"
      caBundle: "replace-me"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          # Injected: kubernetes-<supervisor_ns>-<cluster_name>
          mountPath: "replacemens-replacemecluster"
          # Injected: <supervisor_ns>-<cluster_name>
          role: "replacemens-replacemecluster"
          serviceAccountRef:
            name: "secret-store-access"
            namespace: "external-secrets"
