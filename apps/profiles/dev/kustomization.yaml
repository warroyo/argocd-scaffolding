# Dev app profile — every dev cluster's app stack inherits this. See CLAUDE.md
# "Changing every cluster in an environment".
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

components:
- ../../components/stacks/standard   # package installer, repo, cert-manager
- ../../components/envs/dev           # real dev values (last)
