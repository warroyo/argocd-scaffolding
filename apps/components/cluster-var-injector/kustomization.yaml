# Apps-side variable injection, mirroring infrastructure/components/cluster-var-injector.
#
# The apps tree cannot reference the cluster's cluster-details.yaml (kustomize
# load restrictions forbid FILES outside the kustomization root), so each
# cluster's apps/kustomization.yaml declares a tiny `vars` configMapGenerator
# with its cluster_name (validate.sh checks it matches the directory). Keep
# this component LAST in the apps component list — it rewrites resources
# brought in by the profile and the stacks.
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

replacements:
  - source:
      kind: ConfigMap
      name: vars
      fieldPath: data.cluster_name
    targets:
      - select:
          labelSelector: "config.k8s.io/inject-cluster-name-prefix=true"
        fieldPaths:
        - metadata.name
        options:
          delimiter: '-'
          index: 0
