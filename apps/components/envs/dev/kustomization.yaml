# Real dev-environment values for the ALWAYS-ON app baseline (the standard
# stack), applied over the replace-me placeholders in the bases. Included by
# apps/profiles/dev, so every dev cluster inherits it. Versions for OPTIONAL
# app stacks live in feature-scoped sub-components included by the cluster
# alongside the stack.
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
- target:
    group: packaging.carvel.dev
    version: v1alpha1
    kind: PackageInstall
    name: cert-manager
  patch: |-
    - op: replace
      path: /spec/packageRef/versionSelection/constraints
      value: "1.19.2+vmware.1-vks.1" # Dev cert-manager version
- target:
    group: external-secrets.io
    version: v1
    kind: ClusterSecretStore
    labelSelector: "app.kubernetes.io/name=secret-store"
  patch: |-
    # SET ME: base64 CA of the dev VCF Secret Store (server-cert secret, ca.crt).
    - op: replace
      path: /spec/provider/vault/caBundle
      value: "" # base64 CA of the dev VCF Secret Store (server-cert, ns svc-secret-store-0iid0)
