apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-provisioning
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    # Matrix join: each supervisor-ns cluster (by label) paired only with cluster
    # dirs under its own {project}/{namespace_ref}/ path. See CLAUDE.md "Decision model".
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  type: supervisor-ns
              values:
                project: '{{index .metadata.labels "gitops.platform/project"}}'
                namespaceRef: '{{index .metadata.labels "gitops.platform/namespace-ref"}}'
                namespace: '{{index .metadata.labels "gitops.platform/namespace"}}'
          - git:
              repoURL: ARGOCD_REPO_URL
              revision: main
              files:
                - path: infrastructure/clusters/{{.values.project}}/{{.values.namespaceRef}}/*/cluster-details.yaml
  template:
    metadata:
      # Name keyed on the full path tuple — unique even when cluster names repeat.
      name: '{{.values.project}}-{{.values.namespaceRef}}-{{.path.basename}}-provision'
      finalizers:
      - resources-finalizer.argocd.argoproj.io
      labels:
        tenant: '{{.values.project}}'
        type: "cluster-infrastructure"
    spec:
      project: infra
      source:
        repoURL: ARGOCD_REPO_URL
        targetRevision: main
        path: '{{.path.path}}'
      destination:
        # Resolved from the supervisor-namespace cluster registration, not git:
        # .name is the ArgoCD cluster name (supervisor-ns-<suffixed>) and
        # .values.namespace is the suffixed namespace from the cluster label.
        name: '{{.name}}'
        namespace: '{{.values.namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
