apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-apps
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  # Removing an Application from the generated set leaves its deployed workloads
  # in place (no cascade-prune) — so renames/removals don't churn live apps.
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
    - matrix:
        generators:
        - clusters:
            selector:
              matchLabels:
                type: 'tenant'
            values:
              project: '{{index .metadata.labels "gitops.platform/project"}}'
              namespaceRef: '{{index .metadata.labels "gitops.platform/namespace-ref"}}'
        - git:
            repoURL: ARGOCD_REPO_URL
            revision: main
            files:
            # Exact join: project + namespace_ref come from the cluster labels and
            # {{.name}} is the workload cluster name, so the path is unambiguous
            # (mirrors the cluster-provisioning ApplicationSet).
            - path: infrastructure/clusters/{{.values.project}}/{{.values.namespaceRef}}/{{.name}}/cluster-details.yaml
  template:
    metadata:
      # Path-scoped so it stays unique when cluster names repeat across
      # tenants/namespaces (.name is the bare workload cluster name).
      name: '{{.values.project}}-{{.values.namespaceRef}}-{{.name}}-apps'
      finalizers:
      - resources-finalizer.argocd.argoproj.io
    spec:
      project: 'infra'
      source:
        repoURL: ARGOCD_REPO_URL
        targetRevision: main
        path: '{{.path.path}}/apps'
      destination:
        server: '{{.server}}'
        namespace: default
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
