# Single source of truth for the GitOps repo URL.
# Update repoURL when forking or moving this repository.
# The value is injected into all ApplicationSets via Kustomize replacements
# defined in argocd/kustomization.yaml.
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-repo-config
  annotations:
    config.kubernetes.io/local-config: "true"
data:
  repoURL: https://github.com/warroyo/argocd-scaffolding
