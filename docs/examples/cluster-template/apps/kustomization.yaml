apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
# Inherit the app baseline for this environment (swap `dev` as needed).
- ../../../../../../apps/profiles/dev
# Include only if this cluster runs istio (via the supervisor addon) + AKO,
# to apply the AKO-sidecar integration patch (also uncomment the injector and
# the vars generator below — the injector rewrites the PackageInstall name):
# - ../../../../../../apps/base/istio-ako-patch

components:
# --- Optional per-cluster app stacks (deltas on top of the profile) ---
# (Observability is not an app stack — it's on by default via the base
# Cluster's automated-monitoring addon label, VKS 9.1+; opt out on the infra
# side with infrastructure/components/disable-observability.)
# --- Variable injection MUST be last (needed by istio-ako-patch) ---
# - ../../../../../../apps/components/cluster-var-injector

# This cluster's identity for the injector. Kustomize load restrictions keep the
# apps tree from reading ../cluster-details.yaml, so cluster_name is declared
# again here (must equal the directory name — validate.sh enforces it).
# configMapGenerator:
# - name: vars
#   literals:
#   - cluster_name=my-cluster
# generatorOptions:
#   disableNameSuffixHash: true
#   annotations:
#     config.kubernetes.io/local-config: "true"
