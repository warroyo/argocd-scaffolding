apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../../../../../apps/profiles/dev        # app baseline for this env
# - ../../../../../../apps/base/istio-ako-patch   # only if this cluster runs istio + AKO

components:
# cluster-var-injector MUST be last, and is REQUIRED on every cluster
# (tenant-sync SA/RBAC needs cluster_name/project everywhere).
- ../../../../../../apps/components/cluster-var-injector

# Injector identity — the apps tree can't read ../cluster-details.yaml, so
# cluster_name/project are re-declared here (validate.sh checks both).
configMapGenerator:
- name: vars
  literals:
  - cluster_name=my-cluster
  - project=my-tenant
generatorOptions:
  disableNameSuffixHash: true
  annotations:
    config.kubernetes.io/local-config: "true"
