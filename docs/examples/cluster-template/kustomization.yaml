apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
# Inherit everything a cluster in this environment gets by default. Swap `dev`
# for the environment this cluster belongs to (must match the namespace
# `environment` in terraform/infra/tenants.yaml).
- ../../../../profiles/dev
# This cluster's identity, and the per-tenant tenant-vars ConfigMap.
- ./cluster-details.yaml
- ../../vars

components:
# --- Optional per-cluster features (deltas on top of the profile) ---
# Istio (include both lines together):
# - ../../../../components/istio
# - ../../../../components/ako-istio
# Other add-ons:
# - ../../../../components/cluster-autoscaling
# - ../../../../components/ha-control-plane
#
# --- Variable injection MUST be last ---
# It rewrites names/IDs across every resource pulled in above (profile + the
# feature components), so it has to run after anything that adds resources.
- ../../../../components/cluster-var-injector

# Override anything inherited from the profile here (escape hatch), e.g. bump the
# control-plane to 3 replicas for just this cluster:
# patches:
# - target:
#     kind: Cluster
#   patch: |-
#     - op: replace
#       path: /spec/topology/controlPlane/replicas
#       value: 3
