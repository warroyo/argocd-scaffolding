apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Copy-me cluster. Full guidance: CLAUDE.md "Adding a new cluster".
resources:
- ../../../../profiles/dev        # env defaults — match namespace `environment` in tenants.yaml
- ./cluster-details.yaml
- ../../vars

components:
# CNI: exactly one, day-0 immutable. Default antrea (+antrea-nsx), or swap for cilium/calico.
- ../../../../components/cni-antrea
- ../../../../components/antrea-nsx
# - ../../../../components/cni-cilium
# - ../../../../components/cni-calico
# Optional features — uncomment as needed:
# - ../../../../components/istio            # istio label; pair with ako-istio
# - ../../../../components/ako-istio
# - ../../../../components/istio-config     # opt-in per-cluster istio value overrides
# - ../../../../components/cluster-autoscaling
# - ../../../../components/ha-control-plane
# - ../../../../components/disable-observability   # observability on by default
# - ../../../../components/disable-ako             # AKO on by default
# cluster-var-injector MUST be last — rewrites all resources above.
- ../../../../components/cluster-var-injector

# Per-cluster overrides / canary — uncomment and edit:
# patches:
# - target:
#     kind: Cluster
#   patch: |-
#     - op: replace
#       path: /spec/topology/version
#       value: v1.35.0---vmware.1-vkr.1
