# Consume a Secret Store secret from inside a WORKLOAD cluster — this is what a
# tenant ships in their own app (GitOps, under their AppProject). ESO reads the
# shared platform ClusterSecretStore (vcf-cluster-store) and materializes a
# native k8s Secret. See CLAUDE.md "Wiring the secret store".
#
# remoteRef.key is the KV path: <supervisor_ns>/<cluster>-<name>. The supervisor
# namespace is the vcfa-suffixed name (same value in this cluster's ns-vars).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: db-creds-sync
  namespace: default
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vcf-cluster-store
    kind: ClusterSecretStore
  target:
    name: db-cred            # the k8s Secret ESO creates
  data:
    - secretKey: username
      remoteRef:
        key: dev-1-abcde/dev1-cluster-db-cred   # <supervisor_ns>/<cluster>-<name>
        property: username
    - secretKey: password
      remoteRef:
        key: dev-1-abcde/dev1-cluster-db-cred
        property: password
