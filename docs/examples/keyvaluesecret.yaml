# Create a secret in the VCF Secret Store (OpenBao) — applied BY HAND into the
# SUPERVISOR namespace (not this repo, not a workload cluster). Writes straight
# to OpenBao KV, never to etcd. See https://blog.warroyo.com/posts/vcf-secret-store-eso/.
#
#   kubectl apply -f keyvaluesecret.yaml -n <supervisor-namespace>
#
# CLUSTER-SCOPED: the name MUST be prefixed with the cluster name (<cluster>-<name>)
# so the auto-created per-cluster role can read it. Here cluster = dev1-cluster.
# Values are examples — never commit real secrets.
kind: KeyValueSecret
apiVersion: secretstore.vmware.com/v1alpha1
metadata:
  name: dev1-cluster-db-cred
spec:
  name: dev1-cluster-db-cred
  data:
    - key: username
      value: REPLACE_ME
    - key: password
      value: REPLACE_ME
