# Copy-me template for a namespace's shared label-gated AddonInstalls. Synced
# once per supervisor namespace by the namespace-resources ApplicationSet.
# Copy: cp -r docs/examples/namespace-resources-template \
#   infrastructure/clusters/{project}/{namespace_ref}/namespace-resources
# Pattern: CLAUDE.md "VKS add-ons".
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../../../base/headlamp     # on by default for dev
- ../../../../base/istio        # opt-in (components/istio adds the label)
components:
# Version pins — swap `dev` to the namespace's environment.
- ../../../../components/envs/dev/headlamp
- ../../../../components/envs/dev/istio
