tenants:
  - name: "tenant-1"
    type: tenant
    argo_namespace: "infra"
    # vpc_connectivity_profile_name: "default--us-east-a"  # optional — default is looked up via data source if unset
    namespaces:
      - name: "dev-1"
        environment: dev
      #  zone_name: "zone1"   # always set explicitly — default exists but varies per region
        storage_limit: "200Gi"
        mem_limit: "30Gi"
        cpu_limit: "20000M"
      # - name: "dev-2"
      #   environment: dev
      #   class_name: "small"
        argo_labels:
          type: supervisor-ns
  - name: "infra-1"
    type: infra
    argo_namespace: infra
    namespaces:
      - name: "infra"
        environment: prod
      #  zone_name: "zone1"   # always set explicitly — default exists but varies per region
        deploy_argo: true
        storage_limit: "20Gi"
        mem_limit: "4Gi"
        class_name: large
        argo_labels:
          type: supervisor-ns
