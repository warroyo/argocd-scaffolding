tenants:
  - name: "tenant-1"
    type: tenant
    argo_namespace: "infra"
    # vpc_connectivity_profile_name: "default--us-east-a"  # optional — default is looked up via data source if unset
    # Custom cluster policies — see CLAUDE.md "Adding a policy" for the catalog
    # and docs/ARCHITECTURE.md "Cluster policy + namespace self-service" for the
    # design. All start in dryrun; flip to deny per the rollout order in the
    # policy's own docs once dryrun violations are clean.
    policies:
      require-namespace-labels:
        enforcement: dryrun
      gitops-namespace-containment:
        enforcement: dryrun
      hostname-ownership:
        enforcement: dryrun
        parameters:
          allowedSuffixes:
            - ".will-org-apps.vcf.lab"
      service-exposure:
        enforcement: dryrun
        parameters:
          denyNodePort: true
    namespaces:
      - name: "dev-1"
        environment: dev
        zone_name: "domain-c9"   # always set explicitly — default exists but varies per region
        storage_limit: "400Gi"
        mem_limit: "30Gi"
        cpu_limit: "20000M"
      # - name: "dev-2"
      #   environment: dev
      #   class_name: "small"
        argo_labels:
          type: supervisor-ns
  - name: "infra-1"
    type: infra
    argo_namespace: infra
    namespaces:
      - name: "infra"
        environment: prod
        zone_name: "domain-c9"   # always set explicitly — default exists but varies per region
        deploy_argo: true
        storage_limit: "20Gi"
        mem_limit: "4Gi"
        class_name: large
        argo_labels:
          type: supervisor-ns
