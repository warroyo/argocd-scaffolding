# Supervisor namespace holding Terraform state (kubernetes-backend Secrets).
# Created ONCE, out-of-band: generateName means the API assigns the real name, so
# use `kubectl create` (not apply) and capture it into
# terraform/state-backend/namespace.auto.tfvars. Rendered via envsubst from .env
# placeholders (regionName/vpc/zone/storage vary per install; no safe defaults).
# Exact commands: docs/GETTING-STARTED.md Part 1.
apiVersion: infrastructure.cci.vmware.com/v1alpha3
kind: SupervisorNamespace
metadata:
  generateName: tf-state
  namespace: tf-state          # the CCI Project's namespace (see project.yaml)
spec:
  className: small
  description: Terraform state backend
  regionName: ${TF_VAR_region_name}
  vpcName: ${STATE_NS_VPC}
  classConfigOverrides:
    storageClasses:
      - name: ${STATE_NS_STORAGE_POLICY}
        limit: 5000Mi
    zones:
      - name: ${STATE_NS_ZONE}
        cpuLimit: 1000M
        cpuReservation: 0M
        memoryLimit: 1000Mi
        memoryReservation: 0Mi
        vmClassReservations: []
