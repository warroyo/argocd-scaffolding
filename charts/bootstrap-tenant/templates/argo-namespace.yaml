apiVersion: field.vmware.com/v1
kind: ArgoNamespace
metadata:
  name: {{ .Release.Namespace }}
  namespace: {{ .Release.Namespace }}
spec:
  argoNamespace: {{ .Values.argoNamespace }}
  clusterLabels:
{{- range $k, $v := .Values.clusterLabels }}
    {{ $k }}: {{ $v | quote }}
{{- end }}
    # The vcfa-suffixed namespace name, captured at install time. Consumed by the
    # cluster-provisioning ApplicationSet as destination.namespace so the generated
    # name never has to live in git. See R1 in the plan: this relies on
    # .Release.Namespace being the suffixed name.
    gitops.platform/namespace: {{ .Release.Namespace | quote }}
  project: {{ .Values.tenantName }}
  serviceAccount: ""
