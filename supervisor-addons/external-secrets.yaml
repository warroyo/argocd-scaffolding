# Hand-applied only (Supervisor-admin kubectl) — never Terraform/GitOps.
# See docs/DECISIONS.md #14, docs/GETTING-STARTED.md Part 1.2.
apiVersion: addons.kubernetes.vmware.com/v1alpha1
kind: AddonRepository
metadata:
  name: external-secrets-repo
  namespace: vmware-system-vks-public
  annotations:
    # Required by the validating webhook; must mirror spec.version and
    # spec.addonFilters. Undocumented in the CRD — see docs/DECISIONS.md #14.
    addons.kubernetes.vmware.com/package-offerings: |
      {
        "repositoryVersion": "1.0.0",
        "packages": {
          "external-secrets": {
            "versions": ["2.8.0"]
          }
        }
      }
spec:
  targetRepositoryName: external-secrets-repo
  version: "1.0.0" # catalog-entry version, not the chart version
  fetch:
    helmRepository:
      url: https://charts.external-secrets.io
  addonFilters:
  - name: external-secrets
    versions:
    - "2.8.0"
---
apiVersion: addons.kubernetes.vmware.com/v1alpha1
kind: AddonRepositoryInstall
metadata:
  name: external-secrets-repo-install
  namespace: vmware-system-vks-public
spec:
  addonRepositoryRef:
    name: external-secrets-repo
    namespace: vmware-system-vks-public
