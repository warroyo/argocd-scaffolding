name: Validate

# Runs scripts/validate.sh — the same build-test developers run locally via
# `make validate`. It renders every cluster (and the argocd root) with kustomize
# and checks each cluster-details.yaml against its directory path, catching broken
# overlays and mis-joined clusters at PR time instead of at sync time.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  kustomize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize
        run: |
          curl -sL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz" \
            | tar xz -C /usr/local/bin

      - name: Validate
        run: ./scripts/validate.sh

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: terraform fmt
        run: terraform fmt -check -recursive terraform/

      # -backend=false: no state-backend creds at PR time; validate only needs
      # providers + syntax. Runs against the COMMITTED generated bootstrap
      # wiring, so a hand-edited providers.tf/main.tf fails here.
      - name: terraform validate
        run: |
          for dir in terraform/infra terraform/bootstrap terraform/state-backend; do
            echo "validating $dir"
            terraform -chdir="$dir" init -backend=false -input=false >/dev/null
            terraform -chdir="$dir" validate
          done
