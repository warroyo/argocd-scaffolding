name: Apply

on:
  push:
    branches: [main]
    paths:
      # Anything that changes what terraform provisions or renders — not just
      # tenants.yaml. The workflow's own "[skip ci]" commit of generated files
      # does not re-trigger (workflow-pushed commits + skip ci).
      - 'terraform/**'
      - 'charts/bootstrap-tenant/**'

env:
  # No TTY in Actions — a bare `terraform apply` would die asking for approval.
  TF_APPLY_FLAGS: -auto-approve -input=false

jobs:
  apply:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      # apply-infra → init-infra → state-backend: the stateless helper pulls a fresh
      # state-namespace kubeconfig via the vcfa provider and renders the gitignored
      # backend kubeconfig, then infra inits against the kubernetes backend.
      - name: Apply infra (provisions + renders all generated config)
        run: make apply-infra
        env:
          TF_VAR_vcfa_refresh_token: ${{ secrets.VCFA_REFRESH_TOKEN }}
          TF_VAR_vcfa_url: ${{ secrets.VCFA_URL }}
          TF_VAR_vcfa_org: ${{ secrets.VCFA_ORG }}
          TF_VAR_region_name: ${{ secrets.REGION_NAME }}

      # -A stages deletions too — removing a tenant from tenants.yaml must delete
      # its stale argocd/projects/<name>.yaml and clusters/<name>/vars/.
      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A -- \
            argocd/projects/ \
            infrastructure/clusters/*/vars/ \
            terraform/bootstrap/providers.tf \
            terraform/bootstrap/main.tf
          git diff --staged --quiet || { \
            git commit -m "chore: regenerate config from tenants.yaml [skip ci]" && \
            git push; }

      # Bootstrap mints its own per-namespace tokens via the vcfa provider
      # (terraform/bootstrap/vcfa.tf), so it needs the vcfa creds too.
      - name: Apply bootstrap
        run: make apply-bootstrap
        env:
          TF_VAR_vcfa_refresh_token: ${{ secrets.VCFA_REFRESH_TOKEN }}
          TF_VAR_vcfa_url: ${{ secrets.VCFA_URL }}
          TF_VAR_vcfa_org: ${{ secrets.VCFA_ORG }}
          TF_VAR_argo_password: ${{ secrets.ARGO_PASSWORD }}
          TF_VAR_repo_url: ${{ secrets.REPO_URL }}
          TF_VAR_ako_username: ${{ secrets.AKO_USERNAME }}
          TF_VAR_ako_password: ${{ secrets.AKO_PASSWORD }}
          TF_VAR_ako_ca_data: ${{ secrets.AKO_CA_DATA }}
