name: Apply

on:
  push:
    branches: [main]
    paths:
      - 'terraform/infra/tenants.yaml'

jobs:
  apply:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Apply infra (provisions + renders all generated config)
        run: make apply-infra
        env:
          TF_VAR_vcfa_refresh_token: ${{ secrets.VCFA_REFRESH_TOKEN }}
          TF_VAR_vcfa_url: ${{ secrets.VCFA_URL }}
          TF_VAR_vcfa_org: ${{ secrets.VCFA_ORG }}
          TF_VAR_region_name: ${{ secrets.REGION_NAME }}
          BACKEND_CONFIG: ${{ secrets.INFRA_BACKEND_CONFIG_PATH }}

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            argocd/projects/ \
            infrastructure/clusters/*/vars/ \
            terraform/bootstrap/providers.tf \
            terraform/bootstrap/main.tf
          git diff --staged --quiet || { \
            git commit -m "chore: regenerate config from tenants.yaml [skip ci]" && \
            git push; }

      - name: Apply bootstrap
        run: make apply-bootstrap
        env:
          TF_VAR_argo_password: ${{ secrets.ARGO_PASSWORD }}
          TF_VAR_repo_url: ${{ secrets.REPO_URL }}
          TF_VAR_ako_username: ${{ secrets.AKO_USERNAME }}
          TF_VAR_ako_password: ${{ secrets.AKO_PASSWORD }}
          TF_VAR_ako_ca_data: ${{ secrets.AKO_CA_DATA }}
          BACKEND_CONFIG: ${{ secrets.BOOTSTRAP_BACKEND_CONFIG_PATH }}
