# Dev environment profile — every dev cluster inherits this; edit to change all
# dev clusters at once. See CLAUDE.md "Changing every cluster in an environment".
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../common

components:
# Env overlay — fills real dev values over base placeholders.
- ../../components/envs/dev
