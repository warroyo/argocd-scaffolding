# Dev environment profile — every dev cluster inherits this; edit to change all
# dev clusters at once. See CLAUDE.md "Changing every cluster in an environment".
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base/vks-cluster
- ../../base/cluster-argocd-attach

components:
# CNI is NOT here — each cluster picks exactly one cni-* (day-0, immutable).
- ../../components/argocd-tenant-cluster
- ../../components/ako
# Add-on bundle: istio + external-secrets + observability. Opt out per cluster
# with the matching disable-* component (listed after the profile).
- ../../components/addon-bundles/standard
# Env overlay last — fills real dev values over base placeholders.
- ../../components/envs/dev
