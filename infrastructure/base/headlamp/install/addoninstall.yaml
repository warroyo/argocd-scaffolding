# Shared label-gated headlamp AddonInstall (one per supervisor namespace).
# Pattern: CLAUDE.md "VKS add-ons" Variant A.
apiVersion: addons.kubernetes.vmware.com/v1alpha1
kind: AddonInstall
metadata:
  name: headlamp-addoninstall
  labels:
    app.kubernetes.io/name: headlamp
spec:
  addonRef:
    name: headlamp
  # Version (AddonRelease name) pinned per-env by components/envs/{env}/headlamp.
  releaseFilter:
    ref:
      name: replace-me
      namespace: vmware-system-vks-public
  clusters:
  - selector:
      matchLabels:
        addons.kubernetes.vmware.com/headlamp: enabled
  stopMatchingBehavior: Delete
