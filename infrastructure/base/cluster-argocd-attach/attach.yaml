apiVersion: field.vmware.com/v1
kind: ArgoCluster
metadata:
  name: cluster
  labels:
    config.k8s.io/inject-cluster-name: "true"
  annotations:
    project-debug: ""
spec:
  clusterName: "cluster"
  argoNamespace: "default"
  clusterLabels:
    provider: "vks"
    # Coarse selector (patched to "tenant" by the argocd-tenant-cluster
    # component) plus the decision-model join keys, mirroring the supervisor-ns
    # taxonomy. cluster-var-injector fills project / namespace-ref.
    type: ""
    gitops.platform/project: default
    gitops.platform/namespace-ref: default
  project: "default"