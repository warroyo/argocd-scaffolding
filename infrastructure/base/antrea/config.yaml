# Tunes the auto-installed antrea addon (VKS 3.6+; AntreaConfig CRD is gone).
# Defaults only — feature components flip knobs (e.g. antrea-nsx). Name and
# clusterName/label identity are filled in by cluster-var-injector.
apiVersion: addons.kubernetes.vmware.com/v1alpha1
kind: AddonConfig
metadata:
  name: cluster-antrea
  annotations:
    clusteraddon.addons.kubernetes.vmware.com/owned-for-deletion: "true"
  labels:
    addon.kubernetes.vmware.com/addon-name: antrea
    config.k8s.io/inject-cluster-name-prefix: "true"
    cluster.x-k8s.io/cluster-name: clustername
spec:
  clusterName: clustername
  values:
    antreaNSX:
      enable: false
