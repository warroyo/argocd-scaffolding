# Shared label-gated external-secrets AddonInstall (one per supervisor
# namespace). Pattern: CLAUDE.md "VKS add-ons" Variant A.
apiVersion: addons.kubernetes.vmware.com/v1alpha1
kind: AddonInstall
metadata:
  name: external-secrets-addoninstall
  labels:
    app.kubernetes.io/name: external-secrets
spec:
  addonRef:
    name: external-secrets
  # Helm-based addon: ref.name is "<chart>.<version>", no AddonRelease CR.
  releaseFilter:
    ref:
      name: replace-me
  # Selectors OR; expressions within one AND. Profile grants unless explicitly
  # disabled; the per-addon label also works standalone. CLAUDE.md "VKS add-ons".
  clusters:
  - selector:
      matchExpressions:
      - key: addons.kubernetes.vmware.com/profile
        operator: In
        values: ["standard"]
      - key: addons.kubernetes.vmware.com/external-secrets
        operator: NotIn
        values: ["disabled"]
  - selector:
      matchExpressions:
      - key: addons.kubernetes.vmware.com/external-secrets
        operator: In
        values: ["enabled"]
  stopMatchingBehavior: Delete
