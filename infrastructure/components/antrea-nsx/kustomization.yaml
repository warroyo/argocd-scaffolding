# Antrea-NSX integration. VKS 3.6+ delivers this via an AddonConfig on the
# auto-installed antrea addon (base/antrea). No version to pin — this component
# just pulls the base in and flips the antreaNSX toggle on.
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
resources:
- ../../base/antrea
patches:
- target:
    group: addons.kubernetes.vmware.com
    version: v1alpha1
    kind: AddonConfig
    labelSelector: "addon.kubernetes.vmware.com/addon-name=antrea"
  patch: |-
    - op: replace
      path: /spec/values/antreaNSX/enable
      value: true
