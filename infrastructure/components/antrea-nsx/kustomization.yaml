# Antrea-NSX toggle on the antrea AddonConfig (settings only). Include AFTER cni-antrea.
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
patches:
- target:
    group: addons.kubernetes.vmware.com
    version: v1alpha1
    kind: AddonConfig
    labelSelector: "app.kubernetes.io/name=antrea"
  patch: |-
    - op: replace
      path: /spec/values/antreaNSX/enable
      value: true
