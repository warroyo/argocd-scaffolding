# Opt out of headlamp: flip the headlamp addon label (enabled by default on dev
# clusters via infrastructure/components/envs/dev) to disabled, so the shared
# headlamp AddonInstall no longer selects this cluster.
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
patches:
- target:
    group: cluster.x-k8s.io
    version: v1beta1
    kind: Cluster
  patch: |-
    - op: replace
      path: /metadata/labels/addons.kubernetes.vmware.com~1headlamp
      value: disabled
