# Opt-out of automated observability. VKS 9.1+ turns the monitoring stack
# (prometheus/telegraf) on by default via the `automated-monitoring` addon label
# (set to `enabled` in the base Cluster). Including this component flips that
# label to `disabled` for the cluster. No version pin, so no envs/{env}
# sub-component.
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
patches:
- target:
    group: cluster.x-k8s.io
    version: v1beta1
    kind: Cluster
  patch: |-
    - op: replace
      path: /metadata/labels/addons.kubernetes.vmware.com~1automated-monitoring
      value: disabled
