# Opt out of istio (granted by the standard add-on bundle). Pair with dropping
# components/ako-istio. See CLAUDE.md "VKS add-ons" → add-on bundles.
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
patches:
- target:
    group: cluster.x-k8s.io
    version: v1beta1
    kind: Cluster
  patch: |-
    - op: add
      path: /metadata/labels/addons.kubernetes.vmware.com~1istio
      value: disabled
