# Dev istio version pin (AddonRelease name), included by a namespace's
# namespace-resources after base/istio. See CLAUDE.md "Rolling a version".
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
- target:
    group: addons.kubernetes.vmware.com
    version: v1alpha1
    kind: AddonInstall
    labelSelector: "app.kubernetes.io/name=istio"
  patch: |-
    - op: replace
      path: /spec/releaseFilter/ref/name
      value: "istio.kubernetes.vmware.com.1.28.2-vmware.1-vks.1" # Dev istio AddonRelease
