# Dev headlamp version pin (AddonRelease name), included by a namespace's
# namespace-resources after base/headlamp. See CLAUDE.md "Rolling a version".
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
- target:
    group: addons.kubernetes.vmware.com
    version: v1alpha1
    kind: AddonInstall
    labelSelector: "app.kubernetes.io/name=headlamp"
  patch: |-
    - op: replace
      path: /spec/releaseFilter/ref/name
      value: "headlamp.kubernetes.vmware.com.0.42.0-vmware.1-vks.1" # Dev headlamp AddonRelease
