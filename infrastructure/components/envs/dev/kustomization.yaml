# Real dev-environment values, applied over the replace-me placeholders carried
# in the bases. Every dev cluster inherits this via infrastructure/profiles/dev.
#
# This is also where the ALWAYS-ON versions for dev are pinned (cluster class,
# Kubernetes version, AKO addon) — bump them here to roll dev, then mirror in
# envs/prod when dev soaks. Versions for OPTIONAL features live in the
# feature-scoped sub-components (e.g. ./istio). Per-cluster override: a
# `patches:` block in the cluster kustomization (applies after all components).
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
- target:
    group: addons.kubernetes.vmware.com
    version: v1alpha1
    kind: AddonConfig
    labelSelector: "app.kubernetes.io/name=ako"
  patch: |-
    - op: replace
      path: /spec/values/ControllerSettings/controllerHost
      value: "10.0.0.150" # Dev Controller Host
    - op: replace
      path: /spec/values/ControllerSettings/cloudName
      value: "nsx-wld-cloud" # Dev Cloud Name
- target:
    group: addons.kubernetes.vmware.com
    version: v1alpha1
    kind: AddonConfig
    labelSelector: "app.kubernetes.io/name=ako"
  patch: |-
    - op: replace
      path: /spec/addonConfigDefinitionRef/name
      value: "ako.kubernetes.vmware.com.2.1.3+vmware.1-vks.1" # Dev AKO addon version
- target:
    group: cluster.x-k8s.io
    version: v1beta1
    kind: Cluster
  patch: |-
    - op: replace
      path: /spec/topology/class
      value: "builtin-generic-v3.5.0" # Dev cluster class
    - op: replace
      path: /spec/topology/version
      value: "v1.34.1---vmware.1-vkr.4" # Dev Kubernetes version
- target:
    group: cluster.x-k8s.io
    version: v1beta1
    kind: Cluster
  patch: |-
    - op: replace
      path: /spec/topology/controlPlane/metadata/annotations/run.tanzu.vmware.com~1resolve-os-image
      value: "os-name=ubuntu, content-library=cl-a3b5e06b12f2737ca, os-version=24.04" # Dev content library
    - op: replace
      path: /spec/topology/workers/machineDeployments/0/metadata/annotations/run.tanzu.vmware.com~1resolve-os-image
      value: "os-name=ubuntu, content-library=cl-a3b5e06b12f2737ca, os-version=24.04" # Dev content library
