# Real dev values + always-on version pins (cluster class, k8s, AKO) over base
# placeholders; inherited via profiles/dev. See CLAUDE.md "Rolling a version".
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
- target:
    group: addons.kubernetes.vmware.com
    version: v1alpha1
    kind: AddonConfig
    labelSelector: "app.kubernetes.io/name=ako"
  patch: |-
    - op: replace
      path: /spec/addonConfigDefinitionRef/name
      value: "ako.kubernetes.vmware.com.2.1.3---vmware.1-vks.1" # Dev AKO AddonConfigDefinition
- target:
    group: addons.kubernetes.vmware.com
    version: v1alpha1
    kind: AddonConfig
    labelSelector: "app.kubernetes.io/name=external-secrets"
  patch: |-
    - op: replace
      path: /spec/values/helmValues/global/hostAliases/0/ip
      value: "10.47.7.13" # Dev VCF Secret Store external IP (svc secret-store, ns svc-secret-store-0iid0)
- target:
    group: cluster.x-k8s.io
    version: v1beta1
    kind: Cluster
  patch: |-
    # headlamp is dev-only, so it stays an env label rather than joining an
    # add-on bundle (opt out: disable-headlamp).
    - op: add
      path: /metadata/labels/addons.kubernetes.vmware.com~1headlamp
      value: enabled
- target:
    group: cluster.x-k8s.io
    version: v1beta1
    kind: Cluster
  patch: |-
    - op: replace
      path: /spec/topology/class
      value: "builtin-generic-v3.7.0" # Dev cluster class (3.7 = helm-controller/addon framework)
    - op: replace
      path: /spec/topology/version
      value: "v1.35.5---vmware.1-vkr.1" # Dev Kubernetes version
- target:
    group: cluster.x-k8s.io
    version: v1beta1
    kind: Cluster
  patch: |-
    - op: replace
      path: /spec/topology/controlPlane/metadata/annotations/run.tanzu.vmware.com~1resolve-os-image
      value: "os-name=ubuntu, os-version=24.04" # Dev content library
    - op: replace
      path: /spec/topology/workers/machineDeployments/0/metadata/annotations/run.tanzu.vmware.com~1resolve-os-image
      value: "os-name=ubuntu, os-version=24.04" # Dev content library
