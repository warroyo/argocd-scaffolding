apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

replacements:
  # ── Cluster name (from this cluster's `vars` ConfigMap) ─────────────────────
  - source:
      kind: ConfigMap
      name: vars
      fieldPath: data.cluster_name

    targets:
      - select:
          labelSelector: "config.k8s.io/inject-cluster-name-prefix=true"
        fieldPaths:
        - metadata.name
        options:
          delimiter: '-'
          index: 0

      - select:
          labelSelector: "config.k8s.io/inject-cluster-name=true"
        fieldPaths:
        - metadata.name

      # Antrea AddonConfig (VKS 3.6+) — clusterName + cluster-name label.
      - select:
          kind: AddonConfig
          labelSelector: "app.kubernetes.io/name=antrea"
        fieldPaths:
        - spec.clusterName
        - metadata.labels.[cluster.x-k8s.io/cluster-name]



  # ── ArgoCluster registration (decision-model join keys) ─────────────────────
  - source:
      kind: ConfigMap
      name: vars
      fieldPath: data.project
    targets:
      - select:
          kind: ArgoCluster
        fieldPaths:
        - spec.project
        - spec.clusterLabels.[gitops.platform/project]
  - source:
      kind: ConfigMap
      name: vars
      fieldPath: data.namespace_ref
    targets:
      - select:
          kind: ArgoCluster
        fieldPaths:
        - spec.clusterLabels.[gitops.platform/namespace-ref]
  - source:
      kind: ConfigMap
      name: tenant-vars
      fieldPath: data.argo_namespace
    targets:
      - select:
          kind: ArgoCluster
        fieldPaths:
        - spec.argoNamespace
