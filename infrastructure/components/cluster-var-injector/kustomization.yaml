apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

replacements:
  # ── Cluster name (from this cluster's `vars` ConfigMap) ─────────────────────
  - source:
      kind: ConfigMap
      name: vars
      fieldPath: data.cluster_name

    targets:
      - select:
          labelSelector: "config.k8s.io/inject-cluster-name-prefix=true"
        fieldPaths:
        - metadata.name
        options:
          delimiter: '-'
          index: 0

      - select:
          labelSelector: "config.k8s.io/inject-cluster-name=true"
        fieldPaths:
        - metadata.name

      - select:
          kind: AddonConfig
          labelSelector: "app.kubernetes.io/name=ako"
        fieldPaths:
        - spec.values.AKOSettings.clusterName

      - select:
          kind: AddonInstall
          labelSelector: "config.k8s.io/inject-cluster-name-prefix=true"
        fieldPaths:
        - spec.clusters.0.selector.matchLabels.[cluster.x-k8s.io/cluster-name]

  # ── Tenant identity (from the terraform-rendered tenant-vars ConfigMap) ─────
  - source:
      kind: ConfigMap
      name: tenant-vars
      fieldPath: data.tenant_uuid
    targets:
      - select:
          kind: AddonConfig
          labelSelector: "app.kubernetes.io/name=ako"
        fieldPaths:
        - spec.values.ControllerSettings.tenantName

  # Full T1 path rendered by terraform (no delimiter splicing — the base holds a
  # single replace-me placeholder).
  - source:
      kind: ConfigMap
      name: tenant-vars
      fieldPath: data.nsxt_t1_path
    targets:
      - select:
          kind: AddonConfig
          labelSelector: "app.kubernetes.io/name=ako"
        fieldPaths:
        - spec.values.NetworkSettings.nsxtT1LR

  # ── ArgoCluster registration (decision-model join keys) ─────────────────────
  - source:
      kind: ConfigMap
      name: vars
      fieldPath: data.project
    targets:
      - select:
          kind: ArgoCluster
        fieldPaths:
        - spec.project
        - spec.clusterLabels.[gitops.platform/project]
  - source:
      kind: ConfigMap
      name: vars
      fieldPath: data.namespace_ref
    targets:
      - select:
          kind: ArgoCluster
        fieldPaths:
        - spec.clusterLabels.[gitops.platform/namespace-ref]
  - source:
      kind: ConfigMap
      name: tenant-vars
      fieldPath: data.argo_namespace
    targets:
      - select:
          kind: ArgoCluster
        fieldPaths:
        - spec.argoNamespace
