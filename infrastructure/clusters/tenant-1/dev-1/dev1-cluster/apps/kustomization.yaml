apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
# Inherit the dev app baseline (standard stack).
- ../../../../../../apps/profiles/dev
# This cluster runs istio + AKO, so it ships the AKO-sidecar integration patch
# (cluster-var-injector below rewrites its PackageInstall name).
- ../../../../../../apps/base/istio-ako-patch

components:
# --- Optional per-cluster app stacks (deltas on top of the profile) ---
# (observability is no longer an app stack — it's on by default via the base
# Cluster's automated-monitoring addon label, VKS 9.1+; opt out with
# infrastructure/components/disable-observability.)
# --- Variable injection MUST be last ---
- ../../../../../../apps/components/cluster-var-injector

# This cluster's identity for the injector. Kustomize load restrictions keep the
# apps tree from reading ../cluster-details.yaml, so cluster_name is declared
# again here — validate.sh checks it matches the directory name.
configMapGenerator:
- name: vars
  literals:
  - cluster_name=dev1-cluster
generatorOptions:
  disableNameSuffixHash: true
  annotations:
    config.kubernetes.io/local-config: "true"
