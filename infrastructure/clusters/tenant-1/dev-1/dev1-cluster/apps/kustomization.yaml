apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
# Inherit the dev app baseline (standard stack).
- ../../../../../../apps/profiles/dev
# This cluster runs istio + AKO, so it ships the AKO-sidecar integration patch
# (cluster-var-injector below rewrites its PackageInstall name).
- ../../../../../../apps/base/istio-ako-patch

components:
# --- Optional per-cluster app stacks (deltas on top of the profile) ---
# (observability is not an app stack — it's a cluster addon label; see infra side)
# --- Variable injection MUST be last ---
- ../../../../../../apps/components/cluster-var-injector

# This cluster's identity for the injector. Kustomize load restrictions keep the
# apps tree from reading ../cluster-details.yaml, so cluster_name and project
# are declared again here — validate.sh checks cluster_name matches the
# directory name and project matches the tenant directory segment.
configMapGenerator:
- name: vars
  literals:
  - cluster_name=dev1-cluster
  - project=tenant-1
generatorOptions:
  disableNameSuffixHash: true
  annotations:
    config.kubernetes.io/local-config: "true"
