apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
# Inherit the dev environment defaults (bases + always-on components + env values).
- ../../../../profiles/dev
# Cluster identity (this cluster's vars ConfigMap) and the per-tenant tenant-vars.
- ./cluster-details.yaml
- ../../vars

components:
# --- Optional per-cluster features (deltas on top of the profile) ---
- ../../../../components/istio
- ../../../../components/ako-istio
- ../../../../components/cluster-autoscaling
# - ../../../../components/ha-control-plane
# --- Variable injection MUST be last ---
# It rewrites names/IDs across every resource accumulated above (from the profile
# AND the feature components), so anything that contributes resources has to come
# before it.
- ../../../../components/cluster-var-injector

# Override anything inherited from the profile here, e.g.:
# patches:
# - target:
#     kind: Cluster
#   patch: |-
#     - op: replace
#       path: /spec/topology/controlPlane/replicas
#       value: 3
