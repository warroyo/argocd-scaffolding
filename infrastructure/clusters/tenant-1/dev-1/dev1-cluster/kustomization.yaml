apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../../../profiles/dev        # dev env defaults
- ./cluster-details.yaml
- ../../vars                      # per-tenant tenant-vars

components:
# CNI: exactly one, day-0 immutable.
- ../../../../components/cni-antrea
- ../../../../components/antrea-nsx
# istio comes from the standard add-on bundle; ako-istio is separate because
# the pairing only applies when AKO/AVI is installed. istio-config = opt-in
# per-cluster value overrides (drop for defaults).
- ../../../../components/ako-istio
- ../../../../components/istio-config
- ../../../../components/cluster-autoscaling
# cluster-var-injector MUST be last — rewrites all resources above.
- ../../../../components/cluster-var-injector

# Per-cluster overrides / canary: add a `patches:` block here.
# Template + full guidance: docs/examples/cluster-template, CLAUDE.md "Adding a new cluster".
