apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
# Inherit the dev environment defaults (bases + always-on components + env values).
- ../../../../profiles/dev
# Cluster identity (this cluster's vars ConfigMap) and the per-tenant tenant-vars.
- ./cluster-details.yaml
- ../../vars

components:
# --- Optional per-cluster features (deltas on top of the profile) ---
# Feature + its env sub-component travel together (the sub-component pins the
# feature's version for this environment).
- ../../../../components/istio
- ../../../../components/ako-istio
- ../../../../components/envs/dev/istio
- ../../../../components/cluster-autoscaling
# Observability is on by default; opt out with:
# - ../../../../components/disable-observability
# - ../../../../components/ha-control-plane
# --- Variable injection MUST be last ---
# It rewrites names/IDs across every resource accumulated above (from the profile
# AND the feature components), so anything that contributes resources has to come
# before it.
- ../../../../components/cluster-var-injector

# Override anything inherited from the profile here (applies after all
# components), e.g. pin a different Kubernetes version for just this cluster
# during a canary, or bump the control plane:
# patches:
# - target:
#     kind: Cluster
#   patch: |-
#     - op: replace
#       path: /spec/topology/version
#       value: v1.35.0---vmware.1-vkr.1
#     - op: replace
#       path: /spec/topology/controlPlane/replicas
#       value: 3
