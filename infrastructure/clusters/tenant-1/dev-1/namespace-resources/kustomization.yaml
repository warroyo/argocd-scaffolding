# Shared label-gated AddonInstalls for the tenant-1/dev-1 namespace. Synced once
# per namespace by the namespace-resources ApplicationSet. See CLAUDE.md "VKS add-ons".
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../../../base/headlamp    # on by default for dev
- ../../../../base/istio       # opt-in (components/istio adds the label)
components:
# Version pins.
- ../../../../components/envs/dev/headlamp
- ../../../../components/envs/dev/istio
