# Shared label-gated AddonInstalls for the tenant-1/dev-1 namespace. Synced once
# per namespace by the namespace-resources ApplicationSet. See CLAUDE.md "VKS add-ons".
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../../../base/headlamp          # dev-only (envs/dev label)
- ../../../../base/istio             # standard add-on bundle
# external-secrets is blocked on the helm-controller prerequisite — see
# docs/DECISIONS.md #14. Re-add with the envs/dev pin once that is resolved.
# - ../../../../base/external-secrets
components:
# Version pins.
- ../../../../components/envs/dev/headlamp
- ../../../../components/envs/dev/istio
