# Namespace-level resources for the tenant-1/dev-1 supervisor namespace. Synced
# ONCE per namespace by the namespace-resources ApplicationSet (destination =
# this namespace), separate from the per-cluster infra builds. Put anything
# namespace-scoped here (shared, label-gated add-on installs; quotas; etc.) — it
# covers every cluster in the namespace. Headlamp is on by default for dev clusters:
# envs/dev labels the Cluster addons.kubernetes.vmware.com/headlamp=enabled; opt a
# cluster out with infrastructure/components/disable-headlamp.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../../../base/headlamp
components:
# Pins the dev headlamp version (base carries a replace-me placeholder). Swap
# `dev` to match this namespace's environment.
- ../../../../components/envs/dev/headlamp
